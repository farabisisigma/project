<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokoOnline — Belanja</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}
.navbar{background:#1e1b4b;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;border-bottom:1px solid #312e81}
.logo-wrap{display:flex;align-items:center;gap:10px;flex:1}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#818cf8,#6366f1);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 0 3px rgba(129,140,248,.25)}
.logo-name{font-size:17px;font-weight:700;color:#fff}
.logo-sub{font-size:10px;color:#a5b4fc;text-transform:uppercase;letter-spacing:.1em}
.search-bar{flex:1;max-width:380px}
.search-bar input{width:100%;padding:8px 14px;border-radius:20px;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:14px}
.search-bar input::placeholder{color:rgba(255,255,255,.5)}
.search-bar input:focus{outline:none;background:rgba(255,255,255,.2)}
.nav-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px;color:#fff;display:flex;align-items:center;gap:6px}
.nav-btn:hover{background:rgba(255,255,255,.18)}
.cart-count{background:#818cf8;color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 12px 4px 4px;cursor:pointer;color:#fff;font-size:13px;position:relative}
.user-avatar{width:26px;height:26px;border-radius:50%;background:#818cf8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1e1b4b}
.dropdown{position:absolute;top:38px;right:0;background:#fff;border:1px solid #e5e5e5;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);width:180px;z-index:200;display:none;overflow:hidden}
.dropdown.show{display:block}
.dropdown-head{padding:12px 14px;border-bottom:1px solid #f0f0f0}
.dropdown-name{font-size:13px;font-weight:600;color:#1a1a1a}
.dropdown-item{padding:10px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.dropdown-item:hover{background:#f5f5f5}
.dropdown-item.danger{color:#ef4444}
.main{display:flex;min-height:calc(100vh - 57px)}
.sidebar{width:220px;min-width:220px;border-right:1px solid #e5e5e5;padding:16px;background:#fff}
.sidebar h3{font-size:11px;font-weight:600;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em}
.sidebar select{width:100%;margin-bottom:10px;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid #ddd;background:#f9f9f9}
.sidebar label{font-size:12px;color:#888;display:block;margin-bottom:4px}
input[type=range]{width:100%;accent-color:#4f46e5;margin-bottom:6px}
.content{flex:1;padding:20px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:600}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.product-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.product-card:hover{border-color:#a5b4fc;box-shadow:0 4px 16px rgba(79,70,229,.1);transform:translateY(-2px)}
.product-img{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:40px;background:#f8f8f8;overflow:hidden}
.product-img img{width:100%;height:100%;object-fit:cover}
.product-info{padding:12px}
.product-name{font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-price{font-size:15px;font-weight:700;color:#4f46e5;margin-bottom:6px}
.product-meta{font-size:11px;color:#aaa;display:flex;justify-content:space-between;margin-bottom:10px}
.stars{color:#f59e0b}
.add-btn{width:100%;padding:8px;border-radius:8px;border:none;background:#4f46e5;color:#fff;font-size:13px;cursor:pointer;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s}
.add-btn:hover{background:#4338ca}
.add-btn.loading{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}
.add-btn.added{background:#dcfce7;color:#16a34a;border:1px solid #86efac}
.add-btn .btn-icon{transition:transform .2s}
.add-btn.added .btn-icon{animation:pop .3s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}
.panel{position:fixed;top:0;right:0;bottom:0;width:380px;background:#fff;border-left:1px solid #e5e5e5;z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.panel.open{transform:translateX(0)}
.panel-head{padding:16px 20px;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center}
.panel-head h2{font-size:16px;font-weight:700}
.close-btn{background:none;border:none;font-size:18px;cursor:pointer;color:#888;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.close-btn:hover{background:#f5f5f5}
.panel-body{flex:1;overflow-y:auto;padding:16px}
.cart-item{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5}
.cart-thumb{width:44px;height:44px;border-radius:8px;background:#f5f5f5;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.cart-thumb img{width:100%;height:100%;object-fit:cover}
.cart-info{flex:1;min-width:0}
.cart-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-price{font-size:12px;color:#4f46e5;font-weight:600}
.qty-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.qty-btn{width:22px;height:22px;border-radius:4px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.qty-num{font-size:13px;min-width:18px;text-align:center;font-weight:500}
.del-btn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:15px;padding:2px}
.panel-foot{padding:16px;border-top:1px solid #e5e5e5}
.pay-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0}
.pay-opt{border:1px solid #ddd;border-radius:8px;padding:8px 10px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px;background:#f9f9f9;font-weight:500}
.pay-opt.selected{border-color:#4f46e5;background:#eef2ff;color:#4f46e5}
.total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-bottom:12px}
.checkout-btn{width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.checkout-btn:hover{background:#4338ca}
.empty-state{text-align:center;padding:40px;color:#aaa;font-size:14px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;display:none}
.overlay.show{display:block}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:500px;max-width:95vw;background:#fff;border-radius:14px;z-index:300;overflow:hidden;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal.hide{display:none}
.modal-head{padding:16px 20px;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:16px;font-weight:700}
.modal-body{padding:20px;overflow-y:auto}
.modal-img{width:100%;height:200px;background:#f5f5f5;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:16px}
.modal-img img{width:100%;height:100%;object-fit:cover}
.modal-name{font-size:20px;font-weight:700;margin-bottom:6px}
.modal-price{font-size:22px;font-weight:700;color:#4f46e5;margin-bottom:10px}
.modal-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.badge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-cat{background:#ede9fe;color:#6d28d9}
.badge-sold{background:#fffbeb;color:#d97706}
.modal-desc{font-size:14px;color:#555;line-height:1.6;margin-bottom:16px}
.review-title{font-size:13px;font-weight:600;margin-bottom:8px}
.review-item{border-top:1px solid #f0f0f0;padding:8px 0}
.review-author{font-size:12px;font-weight:600;margin-bottom:2px}
.review-text{font-size:12px;color:#666}
.modal-add-btn{width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px}
.modal-add-btn:hover{background:#4338ca}
.notif{position:fixed;bottom:24px;right:24px;background:#fff;border:1px solid #86efac;border-radius:8px;padding:10px 16px;font-size:13px;color:#16a34a;z-index:500;display:none;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.notif.show{display:block}
.notif.err{border-color:#fca5a5;color:#ef4444}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#1e1b4b;border-top:1px solid #312e81;z-index:100}
.bnav-inner{display:flex}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 12px;font-size:10px;color:rgba(255,255,255,.55);cursor:pointer;gap:3px;border:none;background:none;position:relative}
.bnav-item.active,.bnav-item:hover{color:#a5b4fc}
.bnav-icon{font-size:20px}
.bnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:#818cf8;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;z-index:180;padding:20px 20px 90px;transform:translateY(100%);transition:transform .3s;max-height:75vh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.1)}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
@media(max-width:640px){
  .logo-sub,.sidebar{display:none}
  .search-bar{flex:1}
  .main{flex-direction:column}
  .content{padding:12px 12px 90px}
  .product-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .product-img{height:120px}
  .panel{width:100%;top:auto;height:88vh;border-radius:16px 16px 0 0}
  .modal{width:100%;max-width:100%;top:auto;left:0;right:0;bottom:0;transform:none;border-radius:16px 16px 0 0;max-height:88vh}
  .bottom-nav{display:block}
  .notif{bottom:72px;left:12px;right:12px;text-align:center}
}
</style>
</head>
<body>
<nav class="navbar">
  <div class="logo-wrap">
    <div class="logo-icon">🛍️</div>
    <div>
      <div class="logo-name">TokoOnline</div>
      <div class="logo-sub">Platform Belanja</div>
    </div>
  </div>
  <div class="search-bar"><input type="text" placeholder="Cari produk..." id="searchInput" oninput="filterProducts()"></div>
  <button class="nav-btn" onclick="toggleCart()">🛒 Keranjang <span class="cart-count" id="cartCount">0</span></button>
  <div class="user-chip" id="userChip" onclick="toggleDropdown(event)">
    <div class="user-avatar" id="userAvatar">?</div>
    <span id="userName">...</span>
    <div class="dropdown" id="dropdown">
      <div class="dropdown-head">
        <div class="dropdown-name" id="dropName">-</div>
        <div style="font-size:11px;color:#aaa" id="dropEmail">-</div>
      </div>
      <div class="dropdown-item">📦 Pesanan saya</div>
      <div class="dropdown-item danger" onclick="logout()">🚪 Keluar</div>
    </div>
  </div>
</nav>

<div class="main">
  <div class="sidebar">
    <h3>Filter</h3>
    <label>Kategori</label>
    <select id="catFilter" onchange="filterProducts()">
      <option value="">Semua</option>
      <option>Elektronik</option><option>Fashion</option>
      <option>Makanan</option><option>Olahraga</option><option>Rumah</option>
    </select>
    <label>Urutkan</label>
    <select id="sortFilter" onchange="filterProducts()">
      <option value="">Default</option>
      <option value="low">Termurah</option><option value="high">Termahal</option>
      <option value="rating">Rating terbaik</option><option value="sold">Terlaris</option>
    </select>
    <label>Harga maks</label>
    <input type="range" id="priceRange" min="0" max="5000000" step="50000" value="5000000" oninput="updateRange(this)">
    <div id="rangeLabel" style="font-size:12px;color:#888;margin-bottom:12px">s/d Rp 5.000.000</div>
  </div>
  <div class="content">
    <div class="section-head">
      <div class="section-title">Semua Produk</div>
      <div style="font-size:13px;color:#888" id="productCount"></div>
    </div>
    <div class="product-grid" id="productGrid"><div class="empty-state" style="grid-column:1/-1">Memuat produk...</div></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<div class="panel" id="cartPanel">
  <div class="panel-head"><h2>Keranjang Belanja</h2><button class="close-btn" onclick="toggleCart()">x</button></div>
  <div class="panel-body" id="cartBody"></div>
  <div class="panel-foot" id="cartFoot" style="display:none">
    <div style="font-size:12px;color:#888;margin-bottom:8px">Metode pembayaran</div>
    <div class="pay-opts">
      <div class="pay-opt selected" onclick="selectPay(this,'Transfer Bank')">Transfer Bank</div>
      <div class="pay-opt" onclick="selectPay(this,'QRIS')">QRIS</div>
      <div class="pay-opt" onclick="selectPay(this,'COD')">COD</div>
      <div class="pay-opt" onclick="selectPay(this,'Dompet Digital')">Dompet Digital</div>
    </div>
    <div class="total-row"><span>Total</span><span id="cartTotal">Rp 0</span></div>
    <button class="checkout-btn" onclick="checkout()">Bayar Sekarang</button>
  </div>
</div>

<div class="modal hide" id="productModal">
  <div class="modal-head"><h2 id="modalTitle">Detail Produk</h2><button class="close-btn" onclick="closeModal()">x</button></div>
  <div class="modal-body" id="modalBody"></div>
</div>

<nav class="bottom-nav">
  <div class="bnav-inner">
    <button class="bnav-item active"><span class="bnav-icon">Home</span>Beranda</button>
    <button class="bnav-item" onclick="openDrawer()"><span class="bnav-icon">Filter</span>Filter</button>
    <button class="bnav-item" onclick="toggleCart()">
      <span class="bnav-icon">Cart</span>Keranjang
      <span class="bnav-badge" id="bnavBadge" style="display:none">0</span>
    </button>
    <button class="bnav-item" onclick="toggleDropdown(event)"><span class="bnav-icon">Akun</span>Akun</button>
  </div>
</nav>

<div class="drawer" id="filterDrawer">
  <div class="drawer-handle"></div>
  <h3 style="margin-bottom:14px">Filter</h3>
  <input type="text" id="searchMobile" placeholder="Cari..." style="width:100%;margin-bottom:12px;padding:10px 12px;border-radius:8px;border:1px solid #ddd;font-size:14px" oninput="syncSearch(this)">
  <select id="catMobile" onchange="syncCat()" style="width:100%;margin-bottom:12px;padding:10px;border-radius:8px;border:1px solid #ddd;font-size:14px">
    <option value="">Semua</option><option>Elektronik</option><option>Fashion</option><option>Makanan</option><option>Olahraga</option><option>Rumah</option>
  </select>
  <select id="sortMobile" onchange="syncSort()" style="width:100%;margin-bottom:16px;padding:10px;border-radius:8px;border:1px solid #ddd;font-size:14px">
    <option value="">Default</option><option value="low">Termurah</option><option value="high">Termahal</option><option value="rating">Rating</option><option value="sold">Terlaris</option>
  </select>
  <button onclick="closeDrawer()" style="width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Terapkan</button>
</div>
<div class="overlay" id="overlayDrawer" onclick="closeDrawer()" style="z-index:170"></div>
<div class="notif" id="notif"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyALuZwAKyRjitcX3aULOagSJmIjvFpprSY",
  authDomain: "tokoku-app-9585c.firebaseapp.com",
  projectId: "tokoku-app-9585c",
  storageBucket: "tokoku-app-9585c.firebasestorage.app",
  messagingSenderId: "245654559498",
  appId: "1:245654559498:web:415a923e9c414e85feb8f3"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth = getAuth(app);

const fmt   = n => 'Rp ' + Math.round(n).toLocaleString('id-ID');
const stars = r => '★'.repeat(Math.round(r||0)) + '☆'.repeat(5-Math.round(r||0));
const EMOJIS = {Elektronik:'📱',Fashion:'👕',Makanan:'🍕',Olahraga:'⚽',Rumah:'🏠'};

let products=[], filteredProducts=[], cart=[], payMethod='Transfer Bank';

const DEFAULT_PRODUCTS = [
  {id:'d1',name:'Smartphone Pro X',cat:'Elektronik',price:3500000,rating:4.8,sold:1240,img:'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500&q=80',desc:'Smartphone flagship kamera 108MP, baterai 5000mAh, layar AMOLED 6.7 inci.',reviews:[{author:'Budi S.',rating:5,text:'Kamera sangat tajam!'},{author:'Rina A.',rating:4,text:'Layar cerah!'}]},
  {id:'d2',name:'Kemeja Batik Premium',cat:'Fashion',price:280000,rating:4.5,sold:890,img:'https://images.unsplash.com/photo-1620012253295-c15cc3e65df4?w=500&q=80',desc:'Batik tulis asli Jogja, motif parang, bahan katun prima.',reviews:[{author:'Andi K.',rating:5,text:'Motifnya indah!'},{author:'Sinta D.',rating:4,text:'Kualitas bagus!'}]},
  {id:'d3',name:'Pizza Margherita',cat:'Makanan',price:75000,rating:4.7,sold:2100,img:'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500&q=80',desc:'Pizza autentik Italia, mozzarella segar, saus tomat San Marzano.',reviews:[{author:'Dewi L.',rating:5,text:'Enak banget!'},{author:'Hendra P.',rating:5,text:'Highly recommended!'}]},
  {id:'d4',name:'Sepatu Lari Aero',cat:'Olahraga',price:450000,rating:4.6,sold:567,img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80',desc:'Bantalan EVA ultra-ringan, outsole carbon fiber.',reviews:[{author:'Fajar M.',rating:5,text:'Nyaman banget!'},{author:'Nina C.',rating:4,text:'Ringan!'}]},
  {id:'d5',name:'Kursi Gaming Ergonomis',cat:'Rumah',price:1800000,rating:4.4,sold:340,img:'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=500&q=80',desc:'Sandaran lumbar, headrest memory foam, armrest 4D.',reviews:[{author:'Rizky T.',rating:4,text:'Nyaman 8 jam!'},{author:'Ayu P.',rating:5,text:'Worth it!'}]},
  {id:'d6',name:'Laptop UltraSlim',cat:'Elektronik',price:4200000,rating:4.9,sold:780,img:'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500&q=80',desc:'13.3 inci, RAM 16GB, SSD 512GB, baterai 12 jam.',reviews:[{author:'Yoga R.',rating:5,text:'Cepat!'},{author:'Mila F.',rating:5,text:'Tipis dan ringan!'}]},
  {id:'d7',name:'Tas Ransel Outdoor',cat:'Fashion',price:320000,rating:4.3,sold:456,img:'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500&q=80',desc:'35L anti air, ventilasi AirMesh, kompartemen laptop 15 inci.',reviews:[{author:'Doni S.',rating:4,text:'Bahan kuat!'},{author:'Lela K.',rating:5,text:'Punggung adem!'}]},
  {id:'d8',name:'Matcha Latte Set',cat:'Makanan',price:95000,rating:4.8,sold:1890,img:'https://images.unsplash.com/photo-1536256263959-770b48d82b0a?w=500&q=80',desc:'Matcha ceremonial Uji Jepang, bamboo whisk, matcha bowl.',reviews:[{author:'Clara H.',rating:5,text:'Smooth!'},{author:'Bagas W.',rating:5,text:'Ceremonial grade!'}]},
];

onAuthStateChanged(auth, user => {
  if (!user) { window.location.href='auth.html'; return; }
  const name = user.displayName||user.email||'Pembeli';
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('userName').textContent   = name.split(' ')[0];
  document.getElementById('dropName').textContent   = name;
  document.getElementById('dropEmail').textContent  = user.email||'';
});

window.logout = async () => { await signOut(auth); window.location.href='auth.html'; };

async function loadProducts() {
  products=[...DEFAULT_PRODUCTS]; filteredProducts=[...products]; renderGrid();
  try {
    const snap=await getDocs(collection(db,'products'));
    if(!snap.empty){
      const fp=snap.docs.map(d=>({id:d.id,...d.data(),rating:d.data().rating||0,sold:d.data().sold||0,reviews:d.data().reviews||[],img:d.data().img||''}));
      const fpNames=fp.map(p=>p.name.toLowerCase());
      products=[...fp,...DEFAULT_PRODUCTS.filter(p=>!fpNames.includes(p.name.toLowerCase()))];
      filteredProducts=[...products]; renderGrid();
    }
  } catch(e){console.warn(e.message);}
}

window.renderGrid = function(){
  const g=document.getElementById('productGrid');
  document.getElementById('productCount').textContent=filteredProducts.length+' produk';
  if(!filteredProducts.length){g.innerHTML='<div class="empty-state" style="grid-column:1/-1">Produk tidak ditemukan</div>';return;}
  g.innerHTML=filteredProducts.map(p=>`
    <div class="product-card" onclick="openModal('${p.id}')">
      <div class="product-img">${p.img?`<img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'">`:`<span>${EMOJIS[p.cat]||'📦'}</span>`}</div>
      <div class="product-info">
        <div class="product-name" title="${p.name}">${p.name}</div>
        <div class="product-price">${fmt(p.price)}</div>
        <div class="product-meta">
          <span class="stars">${stars(p.rating)} ${p.rating||0}</span>
          <span>${(p.sold||0).toLocaleString('id-ID')} terjual</span>
        </div>
        <button class="add-btn" id="btn-${p.id}" onclick="event.stopPropagation();addToCartAnimated('${p.id}',this)">
          <span class="btn-icon">🛒</span><span class="btn-label">Tambah</span>
        </button>
      </div>
    </div>`).join('');
};

window.filterProducts = function(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const sort=document.getElementById('sortFilter').value;
  const maxP=+document.getElementById('priceRange').value;
  filteredProducts=products.filter(p=>(p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q))&&(!cat||p.cat===cat)&&p.price<=maxP);
  if(sort==='low') filteredProducts.sort((a,b)=>a.price-b.price);
  else if(sort==='high') filteredProducts.sort((a,b)=>b.price-a.price);
  else if(sort==='rating') filteredProducts.sort((a,b)=>b.rating-a.rating);
  else if(sort==='sold') filteredProducts.sort((a,b)=>b.sold-a.sold);
  renderGrid();
};
window.updateRange = el=>{document.getElementById('rangeLabel').textContent='s/d '+fmt(+el.value);filterProducts();};
window.syncSearch = el=>{document.getElementById('searchInput').value=el.value;filterProducts();};
window.syncCat = ()=>{document.getElementById('catFilter').value=document.getElementById('catMobile').value;filterProducts();};
window.syncSort = ()=>{document.getElementById('sortFilter').value=document.getElementById('sortMobile').value;filterProducts();};

window.addToCartAnimated = function(id,btn){
  if(btn.classList.contains('loading')) return;
  const p=products.find(x=>String(x.id)===String(id));
  btn.classList.add('loading');btn.disabled=true;
  btn.querySelector('.btn-icon').textContent='⏳';btn.querySelector('.btn-label').textContent='Menambahkan...';
  setTimeout(()=>{
    const ex=cart.find(x=>String(x.id)===String(id));
    if(ex) ex.qty++; else cart.push({...p,qty:1});
    updateCartUI();
    btn.classList.remove('loading');btn.classList.add('added');
    btn.querySelector('.btn-icon').textContent='✅';btn.querySelector('.btn-label').textContent='Ditambahkan!';
    setTimeout(()=>{
      btn.classList.remove('added');
      const ex2=cart.find(x=>String(x.id)===String(id));
      btn.querySelector('.btn-icon').textContent='🛒';
      btn.querySelector('.btn-label').textContent=ex2?`Tambah lagi (${ex2.qty})`:'Tambah';
      btn.disabled=false;
    },1500);
    showNotif('🛒 '+p.name+' ditambahkan!');
  },500);
};

function updateCartUI(){
  const total=cart.reduce((s,x)=>s+x.price*x.qty,0);
  const count=cart.reduce((s,x)=>s+x.qty,0);
  document.getElementById('cartCount').textContent=count;
  document.getElementById('cartTotal').textContent=fmt(total);
  const badge=document.getElementById('bnavBadge');
  if(badge){badge.textContent=count;badge.style.display=count?'flex':'none';}
  const body=document.getElementById('cartBody'),foot=document.getElementById('cartFoot');
  if(!cart.length){body.innerHTML='<div class="empty-state">Keranjang masih kosong</div>';foot.style.display='none';}
  else{
    body.innerHTML=cart.map(x=>`
      <div class="cart-item">
        <div class="cart-thumb">${x.img?`<img src="${x.img}" alt="${x.name}">`:(EMOJIS[x.cat]||'📦')}</div>
        <div class="cart-info">
          <div class="cart-name">${x.name}</div>
          <div class="cart-price">${fmt(x.price)}</div>
          <div class="qty-row">
            <button class="qty-btn" onclick="changeQty('${x.id}',-1)">-</button>
            <span class="qty-num">${x.qty}</span>
            <button class="qty-btn" onclick="changeQty('${x.id}',1)">+</button>
          </div>
        </div>
        <button class="del-btn" onclick="removeCart('${x.id}')">X</button>
      </div>`).join('');
    foot.style.display='block';
  }
}

window.changeQty=(id,d)=>{const item=cart.find(x=>String(x.id)===String(id));if(!item)return;item.qty+=d;if(item.qty<1)removeCart(id);else updateCartUI();};
window.removeCart=id=>{cart=cart.filter(x=>String(x.id)!==String(id));updateCartUI();};
window.toggleCart=()=>{document.getElementById('cartPanel').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');};
window.selectPay=(el,m)=>{document.querySelectorAll('.pay-opt').forEach(e=>e.classList.remove('selected'));el.classList.add('selected');payMethod=m;};
window.checkout=()=>{
  if(!cart.length)return;
  const total=cart.reduce((s,x)=>s+x.price*x.qty,0);
  cart=[];updateCartUI();
  document.getElementById('cartPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  showNotif('Pembayaran via '+payMethod+' berhasil! Total '+fmt(total));
};

window.openModal=id=>{
  const p=products.find(x=>String(x.id)===String(id));
  document.getElementById('modalTitle').textContent=p.name;
  document.getElementById('modalBody').innerHTML=`
    <div class="modal-img">${p.img?`<img src="${p.img}" alt="${p.name}">`:`<span>${EMOJIS[p.cat]||'📦'}</span>`}</div>
    <div class="modal-name">${p.name}</div>
    <div class="modal-price">${fmt(p.price)}</div>
    <div class="modal-badges"><span class="badge badge-cat">${p.cat}</span><span class="badge badge-sold">⭐ ${p.rating||0} · ${(p.sold||0).toLocaleString('id-ID')} terjual</span></div>
    <div class="modal-desc">${p.desc||'-'}</div>
    <div class="review-title">Ulasan pembeli</div>
    ${(p.reviews||[]).map(r=>`<div class="review-item"><div class="review-author">${r.author} ${stars(r.rating)}</div><div class="review-text">${r.text}</div></div>`).join('')}
    <button class="modal-add-btn" onclick="addToCartAnimated('${p.id}',this);closeModal()">Tambah ke keranjang</button>`;
  document.getElementById('productModal').classList.remove('hide');
  document.getElementById('overlay').classList.add('show');
};
window.closeModal=()=>{document.getElementById('productModal').classList.add('hide');document.getElementById('overlay').classList.remove('show');};
window.closeAll=()=>{closeModal();document.getElementById('cartPanel').classList.remove('open');document.getElementById('overlay').classList.remove('show');};
window.showNotif=(msg,err=false)=>{const n=document.getElementById('notif');n.textContent=msg;n.className='notif'+(err?' err':'');n.classList.add('show');setTimeout(()=>n.classList.remove('show'),3000);};
window.toggleDropdown=e=>{e.stopPropagation();document.getElementById('dropdown').classList.toggle('show');};
document.addEventListener('click',()=>document.getElementById('dropdown').classList.remove('show'));
window.openDrawer=()=>{document.getElementById('filterDrawer').classList.add('open');document.getElementById('overlayDrawer').classList.add('show');};
window.closeDrawer=()=>{document.getElementById('filterDrawer').classList.remove('open');document.getElementById('overlayDrawer').classList.remove('show');};

updateCartUI();
loadProducts();
</script>
</body>
</html>
