<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokoOnline — Masuk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e1b4b 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.card-header{background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:28px 28px 24px;text-align:center}
.logo{width:56px;height:56px;background:rgba(255,255,255,.2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px}
.card-header h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.card-header p{font-size:13px;color:rgba(255,255,255,.75)}
.card-body{padding:28px}
.tabs{display:flex;background:#f5f5f5;border-radius:8px;padding:3px;margin-bottom:24px}
.tab-btn{flex:1;padding:8px;border:none;background:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;color:#888;transition:all .2s}
.tab-btn.active{background:#fff;color:#4f46e5;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.form-group{margin-bottom:14px}
.form-group label{font-size:12px;color:#888;display:block;margin-bottom:5px;font-weight:500}
.form-group input{width:100%;padding:10px 12px;border:1.5px solid #e5e5e5;border-radius:8px;font-size:14px;transition:border-color .2s;background:#fafafa}
.form-group input:focus{outline:none;border-color:#4f46e5;background:#fff}
.role-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.role-card{border:2px solid #e5e5e5;border-radius:10px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .2s}
.role-card:hover{border-color:#c7d2fe;background:#eef2ff}
.role-card.selected{border-color:#4f46e5;background:#eef2ff}
.role-icon{font-size:28px;margin-bottom:6px}
.role-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.role-desc{font-size:11px;color:#888}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;font-size:12px;color:#aaa}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee}
.google-btn{width:100%;padding:11px;background:#fff;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;color:#3c4043;margin-bottom:14px;transition:all .2s}
.google-btn:hover{background:#f8f8f8;border-color:#bbb}
.google-icon{width:18px;height:18px}
.primary-btn{width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.primary-btn:hover{background:#4338ca;transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.3)}
.error-msg{background:#fef2f2;border:1px solid #fca5a5;color:#ef4444;font-size:12px;padding:8px 12px;border-radius:6px;margin-bottom:12px;display:none}
.error-msg.show{display:block}
.hint{font-size:12px;color:#888;text-align:center;margin-top:14px}
.hint a{color:#4f46e5;cursor:pointer;font-weight:500}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="card">
  <div class="card-header">
    <div class="logo">🛍️</div>
    <h1>TokoOnline</h1>
    <p>Platform jual beli terpercaya</p>
  </div>
  <div class="card-body">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchAuthTab('login',this)">Masuk</button>
      <button class="tab-btn" onclick="switchAuthTab('register',this)">Daftar</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>

    <!-- LOGIN -->
    <div id="tabLogin">
      <button class="google-btn" onclick="loginGoogle()">
        <svg class="google-icon" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10.1-2 13.7-5.3l-6.3-5.3C29.3 35.3 26.8 36 24 36c-5.2 0-9.7-3.4-11.3-8.1l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.3 5.3C39.9 36.6 44 31 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
        Masuk dengan Google
      </button>
      <div class="divider">atau masuk dengan email</div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="email@kamu.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="primary-btn" onclick="loginEmail()">Masuk</button>
      <div class="hint">Belum punya akun? <a onclick="switchAuthTab('register',document.querySelectorAll('.tab-btn')[1])">Daftar sekarang</a></div>
    </div>

    <!-- REGISTER -->
    <div id="tabRegister" style="display:none">
      <div class="form-group">
        <label>Nama lengkap</label>
        <input type="text" id="regName" placeholder="Nama kamu">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="email@kamu.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min. 6 karakter">
      </div>
      <div class="form-group">
        <label>Daftar sebagai</label>
        <div class="role-select">
          <div class="role-card selected" id="roleBuyer" onclick="selectRole('buyer')">
            <div class="role-icon">🛒</div>
            <div class="role-name">Pembeli</div>
            <div class="role-desc">Cari & beli produk</div>
          </div>
          <div class="role-card" id="roleSeller" onclick="selectRole('seller')">
            <div class="role-icon">🏪</div>
            <div class="role-name">Penjual</div>
            <div class="role-desc">Jual produkmu</div>
          </div>
        </div>
      </div>
      <button class="primary-btn" onclick="registerEmail()">Buat akun</button>
      <div class="hint">Sudah punya akun? <a onclick="switchAuthTab('login',document.querySelectorAll('.tab-btn')[0])">Masuk</a></div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup,
         createUserWithEmailAndPassword, signInWithEmailAndPassword,
         updateProfile, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyALuZwAKyRjitcX3aULOagSJmIjvFpprSY",
  authDomain: "tokoku-app-9585c.firebaseapp.com",
  projectId: "tokoku-app-9585c",
  storageBucket: "tokoku-app-9585c.firebasestorage.app",
  messagingSenderId: "245654559498",
  appId: "1:245654559498:web:415a923e9c414e85feb8f3"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

let selectedRole = 'buyer';

// Cek kalau sudah login → tampilkan opsi ganti role atau redirect
onAuthStateChanged(auth, async user => {
  if (user) {
    showLoading(true);
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) {
      // Belum ada role → tampilkan pilih role
      showLoading(false);
      showRoleModal(user);
    } else {
      const role = snap.data().role || 'buyer';
      // Tampilkan info sudah login + tombol ganti role
      showLoading(false);
      showAlreadyLoggedIn(user, role);
    }
  }
});

function showAlreadyLoggedIn(user, role) {
  const name = user.displayName || user.email || 'Pengguna';
  document.querySelector('.card-body').innerHTML = `
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:40px;margin-bottom:12px">${role==='seller'?'🏪':'🛒'}</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">Halo, ${name.split(' ')[0]}!</div>
      <div style="font-size:13px;color:#888;margin-bottom:20px">Kamu login sebagai <strong>${role==='seller'?'Penjual':'Pembeli'}</strong></div>
      <button onclick="window.location.href='${role==='seller'?'seller.html':'index.html'}'" 
        style="width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px">
        ${role==='seller'?'🏪 Masuk Dashboard Seller':'🛒 Masuk Halaman Belanja'}
      </button>
      <button onclick="switchRole('${user.uid}','${role==='seller'?'buyer':'seller'}')" 
        style="width:100%;padding:12px;background:#f5f5f5;color:#555;border:1px solid #ddd;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:10px">
        Ganti ke ${role==='seller'?'🛒 Mode Pembeli':'🏪 Mode Penjual'}
      </button>
      <button onclick="doLogout()" 
        style="width:100%;padding:10px;background:none;color:#ef4444;border:none;font-size:13px;cursor:pointer">
        🚪 Logout
      </button>
    </div>`;
}

window.switchRole = async function(uid, newRole) {
  showLoading(true);
  try {
    await setDoc(doc(db, 'users', uid), { role: newRole }, { merge: true });
    redirectByRole(newRole);
  } catch(e) {
    showLoading(false);
    alert('Gagal ganti role: ' + e.message);
  }
};

window.doLogout = async function() {
  const { signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
  await signOut(auth);
  window.location.reload();
};

async function getUserRole(uid) {
  try {
    const snap = await getDoc(doc(db, 'users', uid));
    return snap.exists() ? snap.data().role : 'buyer';
  } catch { return 'buyer'; }
}

function redirectByRole(role) {
  if (role === 'seller') window.location.href = 'seller.html';
  else window.location.href = 'index.html';
}

async function saveUserToFirestore(user, role, name) {
  await setDoc(doc(db, 'users', user.uid), {
    name:      name || user.displayName || 'Pengguna',
    email:     user.email || '',
    role:      role,
    createdAt: serverTimestamp()
  }, { merge: true });
}

function showLoading(v) {
  document.getElementById('loadingOverlay').classList.toggle('show', v);
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

// ---- Google Login ----
window.loginGoogle = async function() {
  try {
    showLoading(true);
    const provider = new GoogleAuthProvider();
    const result   = await signInWithPopup(auth, provider);
    const user     = result.user;
    // Cek apakah sudah ada data user
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) {
      // User baru via Google → tanya role
      showLoading(false);
      showRoleModal(user);
    } else {
      redirectByRole(snap.data().role);
    }
  } catch(e) {
    showLoading(false);
    showError('Login Google gagal: ' + e.message);
  }
};

// ---- Email Login ----
window.loginEmail = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  if (!email || !pass) { showError('Isi email dan password'); return; }
  try {
    showLoading(true);
    const result = await signInWithEmailAndPassword(auth, email, pass);
    const role   = await getUserRole(result.user.uid);
    redirectByRole(role);
  } catch(e) {
    showLoading(false);
    if (e.code === 'auth/invalid-credential') showError('Email atau password salah');
    else showError('Login gagal: ' + e.message);
  }
};

// ---- Email Register ----
window.registerEmail = async function() {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPassword').value;
  if (!name || !email || !pass) { showError('Isi semua kolom'); return; }
  if (pass.length < 6) { showError('Password minimal 6 karakter'); return; }
  try {
    showLoading(true);
    const result = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(result.user, { displayName: name });
    await saveUserToFirestore(result.user, selectedRole, name);
    redirectByRole(selectedRole);
  } catch(e) {
    showLoading(false);
    if (e.code === 'auth/email-already-in-use') showError('Email sudah terdaftar');
    else showError('Daftar gagal: ' + e.message);
  }
};

// ---- Role selection untuk Google user baru ----
function showRoleModal(user) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:28px;max-width:360px;width:100%;text-align:center">
      <div style="font-size:36px;margin-bottom:12px">👋</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:6px">Halo, ${user.displayName}!</div>
      <div style="font-size:13px;color:#888;margin-bottom:20px">Daftar sebagai apa?</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <div class="role-card" id="modalBuyer" onclick="selectModalRole('buyer')" style="border:2px solid #4f46e5;background:#eef2ff;border-radius:10px;padding:14px;cursor:pointer;text-align:center">
          <div style="font-size:28px">🛒</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">Pembeli</div>
        </div>
        <div class="role-card" id="modalSeller" onclick="selectModalRole('seller')" style="border:2px solid #e5e5e5;border-radius:10px;padding:14px;cursor:pointer;text-align:center">
          <div style="font-size:28px">🏪</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">Penjual</div>
        </div>
      </div>
      <button onclick="confirmGoogleRole('${user.uid}')" style="width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Lanjutkan</button>
    </div>`;
  document.body.appendChild(overlay);
  window._googleUser      = user;
  window._selectedRoleModal = 'buyer';
}

window.selectModalRole = function(role) {
  window._selectedRoleModal = role;
  document.getElementById('modalBuyer').style.borderColor  = role==='buyer' ? '#4f46e5' : '#e5e5e5';
  document.getElementById('modalBuyer').style.background   = role==='buyer' ? '#eef2ff' : '#fff';
  document.getElementById('modalSeller').style.borderColor = role==='seller'? '#4f46e5' : '#e5e5e5';
  document.getElementById('modalSeller').style.background  = role==='seller'? '#eef2ff' : '#fff';
};

window.confirmGoogleRole = async function(uid) {
  showLoading(true);
  await saveUserToFirestore(window._googleUser, window._selectedRoleModal, window._googleUser.displayName);
  redirectByRole(window._selectedRoleModal);
};

// ---- Helpers ----
window.switchAuthTab = function(tab, el) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tabLogin').style.display    = tab==='login'    ? '' : 'none';
  document.getElementById('tabRegister').style.display = tab==='register' ? '' : 'none';
};

window.selectRole = function(role) {
  selectedRole = role;
  document.getElementById('roleBuyer').classList.toggle('selected',  role==='buyer');
  document.getElementById('roleSeller').classList.toggle('selected', role==='seller');
};
</script>
</body>
</html>
