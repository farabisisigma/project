<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TokoOnline — Masuk</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#1e1b4b,#312e81);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
.header{background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:28px;text-align:center}
.logo{width:52px;height:52px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px}
.header h1{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.header p{font-size:12px;color:rgba(255,255,255,.7)}
.body{padding:24px}
.tabs{display:flex;background:#f5f5f5;border-radius:8px;padding:3px;margin-bottom:20px}
.tab{flex:1;padding:8px;border:none;background:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;color:#888}
.tab.active{background:#fff;color:#4f46e5;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.field{margin-bottom:12px}
.field label{font-size:12px;color:#888;display:block;margin-bottom:4px;font-weight:500}
.field input{width:100%;padding:10px 12px;border:1.5px solid #e5e5e5;border-radius:8px;font-size:14px;background:#fafafa}
.field input:focus{outline:none;border-color:#4f46e5;background:#fff}
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.role-opt{border:2px solid #e5e5e5;border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;transition:all .15s}
.role-opt.sel{border-color:#4f46e5;background:#eef2ff}
.role-opt .icon{font-size:24px;margin-bottom:4px}
.role-opt .name{font-size:13px;font-weight:600}
.role-opt .desc{font-size:11px;color:#888}
.divider{display:flex;align-items:center;gap:8px;margin:14px 0;font-size:12px;color:#aaa}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee}
.google-btn{width:100%;padding:10px;background:#fff;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;color:#333;margin-bottom:12px}
.google-btn:hover{background:#f8f8f8}
.primary{width:100%;padding:11px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.primary:hover{background:#4338ca}
.primary:disabled{background:#aaa;cursor:not-allowed}
.err{background:#fef2f2;border:1px solid #fca5a5;color:#ef4444;font-size:12px;padding:8px 12px;border-radius:6px;margin-bottom:12px;display:none}
.err.show{display:block}
.hint{font-size:12px;color:#888;text-align:center;margin-top:12px}
.hint a{color:#4f46e5;cursor:pointer;font-weight:500}
.loading{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:none;align-items:center;justify-content:center}
.loading.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logged-in{text-align:center;padding:8px 0}
.logged-in .big-icon{font-size:48px;margin-bottom:12px}
.logged-in h2{font-size:17px;font-weight:700;margin-bottom:4px}
.logged-in p{font-size:13px;color:#888;margin-bottom:20px}
.btn-outline{width:100%;padding:10px;background:#f5f5f5;color:#555;border:1px solid #ddd;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:8px}
.btn-outline:hover{background:#eee}
.btn-danger{width:100%;padding:10px;background:none;color:#ef4444;border:none;font-size:13px;cursor:pointer;margin-top:4px}
</style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="card">
  <div class="header">
    <div class="logo">🛍️</div>
    <h1>TokoOnline</h1>
    <p>Platform jual beli terpercaya</p>
  </div>
  <div class="body" id="cardBody">

    <!-- LOGIN FORM -->
    <div id="viewAuth">
      <div class="tabs">
        <button class="tab active" id="tabLoginBtn" onclick="showTab('login')">Masuk</button>
        <button class="tab" id="tabRegBtn" onclick="showTab('register')">Daftar</button>
      </div>
      <div class="err" id="errMsg"></div>

      <!-- LOGIN -->
      <div id="viewLogin">
        <button class="google-btn" onclick="loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H24v8h11.3C33.7 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10.1-2 13.7-5.3l-6.3-5.3C29.3 35.3 26.8 36 24 36c-5.2 0-9.7-3.4-11.3-8.1l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.3 5.3C39.9 36.6 44 31 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
          Masuk dengan Google
        </button>
        <div class="divider">atau email</div>
        <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="email@kamu.com"></div>
        <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"></div>
        <button class="primary" onclick="loginEmail()">Masuk</button>
        <div class="hint">Belum punya akun? <a onclick="showTab('register')">Daftar</a></div>
      </div>

      <!-- REGISTER -->
      <div id="viewRegister" style="display:none">
        <div class="field"><label>Nama lengkap</label><input type="text" id="regName" placeholder="Nama kamu"></div>
        <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="email@kamu.com"></div>
        <div class="field"><label>Password</label><input type="password" id="regPass" placeholder="Min. 6 karakter"></div>
        <div class="field">
          <label>Daftar sebagai</label>
          <div class="role-row">
            <div class="role-opt sel" id="optBuyer" onclick="pickRole('buyer')">
              <div class="icon">🛒</div>
              <div class="name">Pembeli</div>
              <div class="desc">Belanja produk</div>
            </div>
            <div class="role-opt" id="optSeller" onclick="pickRole('seller')">
              <div class="icon">🏪</div>
              <div class="name">Penjual</div>
              <div class="desc">Jual produk</div>
            </div>
          </div>
        </div>
        <button class="primary" onclick="doRegister()">Buat akun</button>
        <div class="hint">Sudah punya akun? <a onclick="showTab('login')">Masuk</a></div>
      </div>
    </div>

    <!-- SUDAH LOGIN -->
    <div id="viewLoggedIn" style="display:none">
      <div class="logged-in">
        <div class="big-icon" id="liIcon">🛒</div>
        <h2 id="liName">Halo!</h2>
        <p id="liRole">Kamu login sebagai Pembeli</p>
        <button class="primary" id="liGo" onclick="goToDashboard()">Masuk ke Toko</button>
        <br><br>
        <button class="btn-outline" id="liSwitch" onclick="switchRole()">Ganti ke Mode Penjual</button>
        <button class="btn-danger" onclick="doLogout()">🚪 Logout</button>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword,
         signInWithEmailAndPassword, updateProfile, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app  = initializeApp({
  apiKey: "AIzaSyALuZwAKyRjitcX3aULOagSJmIjvFpprSY",
  authDomain: "tokoku-app-9585c.firebaseapp.com",
  projectId: "tokoku-app-9585c",
  storageBucket: "tokoku-app-9585c.firebasestorage.app",
  messagingSenderId: "245654559498",
  appId: "1:245654559498:web:415a923e9c414e85feb8f3"
});
const db   = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let currentRole = 'buyer';
let selectedRole = 'buyer';

const load = v => document.getElementById('loading').classList.toggle('show', v);
const err  = msg => { const e=document.getElementById('errMsg'); e.textContent=msg; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),4000); };

// ---- Auth state ----
onAuthStateChanged(auth, async user => {
  if (!user) { load(false); return; }
  currentUser = user;
  try {
    const snap = await getDoc(doc(db,'users',user.uid));
    if (!snap.exists()) {
      // Belum ada role → tampilkan pilih role
      load(false);
      showRolePickerForGoogle(user);
    } else {
      currentRole = snap.data().role || 'buyer';
      load(false);
      showLoggedIn(user, currentRole);
    }
  } catch(e) {
    load(false);
    showLoggedIn(user, 'buyer');
  }
});

function showLoggedIn(user, role) {
  document.getElementById('viewAuth').style.display = 'none';
  document.getElementById('viewLoggedIn').style.display = '';
  const name = user.displayName || user.email || 'Pengguna';
  document.getElementById('liIcon').textContent    = role==='seller' ? '🏪' : '🛒';
  document.getElementById('liName').textContent    = 'Halo, ' + name.split(' ')[0] + '!';
  document.getElementById('liRole').textContent    = 'Kamu login sebagai ' + (role==='seller'?'Penjual':'Pembeli');
  document.getElementById('liGo').textContent      = role==='seller' ? '🏪 Dashboard Seller' : '🛒 Halaman Belanja';
  document.getElementById('liSwitch').textContent  = role==='seller' ? 'Ganti ke Mode Pembeli 🛒' : 'Ganti ke Mode Penjual 🏪';
}

window.goToDashboard = () => {
  window.location.href = currentRole==='seller' ? 'seller.html' : 'index.html';
};

window.switchRole = async () => {
  const newRole = currentRole==='seller' ? 'buyer' : 'seller';
  load(true);
  try {
    const name = currentUser.displayName || currentUser.email || 'Pengguna';
    await setDoc(doc(db,'users',currentUser.uid), {
      role: newRole,
      name: name,
      email: currentUser.email || ''
    }, { merge: true });
    // Langsung redirect tanpa tunggu
    window.location.href = newRole==='seller' ? 'seller.html' : 'index.html';
  } catch(e) {
    load(false);
    alert('Gagal ganti role: ' + e.message);
  }
};

window.doLogout = async () => {
  load(true);
  await signOut(auth);
  currentUser = null; currentRole = 'buyer';
  load(false);
  document.getElementById('viewAuth').style.display = '';
  document.getElementById('viewLoggedIn').style.display = 'none';
};

// ---- Google Login ----
window.loginGoogle = async () => {
  load(true);
  try {
    const result = await signInWithPopup(auth, new GoogleAuthProvider());
    // onAuthStateChanged akan handle redirect
  } catch(e) {
    load(false);
    err('Login Google gagal: ' + e.message);
  }
};

// ---- Email Login ----
window.loginEmail = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email||!pass) { err('Isi email dan password'); return; }
  load(true);
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    load(false);
    err(e.code==='auth/invalid-credential' ? 'Email atau password salah' : e.message);
  }
};

// ---- Register ----
window.doRegister = async () => {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  if (!name||!email||!pass) { err('Isi semua kolom'); return; }
  if (pass.length<6) { err('Password minimal 6 karakter'); return; }
  load(true);
  try {
    const r = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(r.user, { displayName: name });
    await setDoc(doc(db,'users',r.user.uid), { name, email, role: selectedRole, createdAt: serverTimestamp() });
    // onAuthStateChanged handle redirect
  } catch(e) {
    load(false);
    err(e.code==='auth/email-already-in-use' ? 'Email sudah terdaftar' : e.message);
  }
};

// ---- Role picker untuk Google user baru ----
function showRolePickerForGoogle(user) {
  const name = user.displayName || 'Pengguna';
  document.getElementById('cardBody').innerHTML = `
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:32px;margin-bottom:10px">👋</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">Halo, ${name.split(' ')[0]}!</div>
      <div style="font-size:13px;color:#888;margin-bottom:20px">Pilih peran kamu di TokoOnline</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <div class="role-opt sel" id="rp-buyer" onclick="rpPick('buyer')" style="border:2px solid #4f46e5;background:#eef2ff;border-radius:10px;padding:14px;cursor:pointer">
          <div style="font-size:28px">🛒</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">Pembeli</div>
          <div style="font-size:11px;color:#888">Belanja produk</div>
        </div>
        <div class="role-opt" id="rp-seller" onclick="rpPick('seller')" style="border:2px solid #e5e5e5;border-radius:10px;padding:14px;cursor:pointer">
          <div style="font-size:28px">🏪</div>
          <div style="font-size:13px;font-weight:600;margin-top:4px">Penjual</div>
          <div style="font-size:11px;color:#888">Jual produk</div>
        </div>
      </div>
      <button onclick="rpConfirm('${user.uid}')" style="width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Lanjutkan</button>
    </div>`;
  window._rpRole = 'buyer';
}

window.rpPick = role => {
  window._rpRole = role;
  const b=document.getElementById('rp-buyer'), s=document.getElementById('rp-seller');
  b.style.borderColor = role==='buyer'?'#4f46e5':'#e5e5e5';
  b.style.background  = role==='buyer'?'#eef2ff':'#fff';
  s.style.borderColor = role==='seller'?'#4f46e5':'#e5e5e5';
  s.style.background  = role==='seller'?'#eef2ff':'#fff';
};

window.rpConfirm = async uid => {
  load(true);
  const role = window._rpRole || 'buyer';
  const user = auth.currentUser;
  await setDoc(doc(db,'users',uid), {
    name:  user?.displayName || 'Pengguna',
    email: user?.email || '',
    role, createdAt: serverTimestamp()
  });
  currentRole = role;
  load(false);
  window.location.href = role==='seller' ? 'seller.html' : 'index.html';
};

// ---- Helpers ----
window.showTab = tab => {
  document.getElementById('tabLoginBtn').classList.toggle('active', tab==='login');
  document.getElementById('tabRegBtn').classList.toggle('active', tab==='register');
  document.getElementById('viewLogin').style.display    = tab==='login' ? '' : 'none';
  document.getElementById('viewRegister').style.display = tab==='register' ? '' : 'none';
};

window.pickRole = role => {
  selectedRole = role;
  document.getElementById('optBuyer').classList.toggle('sel',  role==='buyer');
  document.getElementById('optSeller').classList.toggle('sel', role==='seller');
};
</script>
</body>
</html>
